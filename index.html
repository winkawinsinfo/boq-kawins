    flex:0 0 auto; background:var(--accent-soft); color:var(--accent);
    font-weight:700; font-size:13px; padding:10px 12px; border-radius:10px;
  }
  .job-code-row input{ flex:1; }
  .hint{ font-size:11.5px; color:var(--ink-soft); margin-top:5px; }
  .computed{ font-size:12.5px; color:var(--accent); font-weight:600; margin-top:6px; }
  .total-preview{
    background:var(--accent-soft); border-radius:12px; padding:14px 16px; margin:18px 0;
    display:flex; align-items:center; justify-content:space-between;
  }
  .total-preview span{ font-size:13px; color:#7A4326; font-weight:500; }

<body>

<div class="device-switch">
  <button class="ds-btn active" id="dsDesktop" onclick="setDeviceMode('desktop')">🖥 Desktop</button>
  <button class="ds-btn" id="dsIos" onclick="setDeviceMode('ios')">📱 iOS</button>
</div>

<div class="app-frame screen-menu" id="appFrame">

  <div class="preview-pane">
    <div class="preview-toolbar">
      <div class="ttl">ตัวอย่างใบเสนอราคา <span>กระดาษ A4</span></div>
      <div class="page-nav">
        <button class="page-nav-btn" id="prevPageBtn" onclick="changePreviewPage(-1)">‹</button>
        <span class="page-nav-label" id="pageNavLabel">1 / 1</span>
        <button class="page-nav-btn" id="nextPageBtn" onclick="changePreviewPage(1)">›</button>
      </div>
      <div class="toolbar-actions">
        <label class="vat-toggle"><input type="checkbox" id="summaryCheck"> Summary</label>
        <label class="vat-toggle"><input type="checkbox" id="feeCheck"> ค่าดำเนินการ 10%</label>
        <label class="vat-toggle"><input type="checkbox" id="vatCheck"> รวม VAT 7%</label>
        <div class="csv-btn-row">
          <button class="dl-btn upload-btn" onclick="document.getElementById('csvFileInput').click()">อัปโหลด CSV</button>
          <input type="file" id="csvFileInput" accept=".csv,text/csv" style="display:none">
          <button class="dl-btn" onclick="downloadCSV()">ดาวน์โหลด CSV</button>
        </div>
      </div>
    </div>
    <div class="preview-scroll" id="previewScroll">
      <div class="paper-zoom-spacer" id="paperZoomSpacer">
        <div class="paper-zoom-wrap" id="paperZoomWrap">
          <div class="paper" id="paper"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="menu-pane">
    <div class="app-header">
      <div class="mode-toggle">
        <button class="mode-pill" id="modePillQuotation" onclick="setAppMode('quotation')">QUOTATION</button>
        <button class="mode-pill" id="modePillTerms" onclick="setAppMode('terms')">TERMS OF PAYMENT</button>

      <p id="appSubtitle">เลือกพื้นที่ → ห้อง → หมวดหมู่งาน</p>

    <div class="menu-scroll" id="menuArea"></div>
  </div>

  <div class="overlay" id="modalOverlay" hidden>
    <div class="sheet">
      <div class="sheet-head">
        <h2 id="modalTitle">เพิ่มรายการ</h2>

  <button class="pdf-btn" onclick="downloadPdf()">

    บันทึกเป็น PDF
  </button>

  <button class="pdf-btn capture-btn" onclick="captureAsImages()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
    แคปเป็นภาพ
  </button>

  <div class="capture-viewer" id="captureViewer" hidden>

      <span id="capturePageLabel">หน้า 1/1</span>

    <div class="capture-viewer-nav">
      <button id="captureNavPrevBtn" onclick="captureNavPrev()">‹ ก่อนหน้า</button>

  <div class="ios-tabbar">

  </div>

</div>

<script>
const CATS = [
  {id:'floor', name:'งานพื้น', color:'#B6562F', unit:'area', customOnly:true, materials:[],
   customForm:{
     itemPlaceholder:'เช่น กระเบื้องแกรนิตโต้',
     specLabel:'ระบุยี่ห้อ/ขนาด/รุ่น',
     specPlaceholder:'เช่น WDC ขนาด 60x60cm. รุ่น Enzo'
   }},
  {id:'wall', name:'งานผนัง', color:'#C9A26A', unit:'area', customOnly:true, materials:[],
   customForm:{
     itemPlaceholder:'เช่น ผนังก่ออิฐมวลเบา',
     specLabel:'ระบุ รูปแบบงาน/รุ่น',
     specPlaceholder:'เช่น ฉาบเรียบ ทาสี TOA8290'
   }},
  {id:'ceiling', name:'งานฝ้าเพดาน', color:'#7E97A6', unit:'area', customOnly:true, materials:[],
   customForm:{
     itemOptions:[
       'ฝ้าเพดาน ยิปซั่มบอร์ด 9mm. โครง C-Line',
       'ฝ้าเพดาน ยิปซั่มบอร์ด 9mm. ชนิดกันชื้น โครง C-Line',
       'ฝ้าเพดาน ไม้อัดปิดผิวลามิเนต โครงเคร่าไม้',
       'ฝ้าเพดาน วัสดุไม้เทียม โครงเหล็กกล่อง 1 1/2"x1 1/2"'
     ],
     specLabel:'ระบุ รูปแบบงาน/รุ่น',
     specPlaceholder:'เช่น ฉาบเรียบ ทาสี TOA 8260'
   }},
  {id:'furniture', name:'งานเฟอร์นิเจอร์', color:'#6B4A36', unit:'wh', materials:[]},
  {id:'electrical', name:'งานไฟฟ้า', color:'#D69A2D', unit:'point', materials:[]},
  {id:'lighting', name:'งานแสงสว่าง', color:'#E0B23E', unit:'point', materials:[]},
  {id:'plumbing', name:'งานประปา', color:'#3F8E8A', unit:'point', materials:[]},
];
const UNIT_LABEL = {area:'ตร.ม.', wh:'ตร.ม.', point:'จุด'};
const CUSTOM_CAT_COLORS = ['#7A8B69','#A35D6A','#4D7EA8','#9C6B30','#6B5B95','#3C8C7D','#B6562F'];
let customCatCounter = 0;

let activeCat = CATS[0].id;
let cart = [];
let nextId = 1;
let furnitureCounter = 1;
let pending = null; // {cat, material, furnitureCode}
let projectName = '';
let ownerName = '';
let companyName = '';
let companyAddr = '';
let vatChecked = false;
let serviceFeeChecked = false;

let sections = [];
let rooms = [];
let nextSectionId = 1;
let nextRoomId = 1;
let view = 'sections'; // 'sections' | 'rooms' | 'items'
let currentSectionId = null;
let currentRoomId = null;
let appMode = 'quotation'; // 'quotation' | 'terms'
let previewPageIndex = 0;
let summaryEnabled = false;
let paymentInstallments = [
  { desc: 'เมื่อเริ่มทำการจัดซื้อวัสดุ เริ่มงาน', percent: 50 },
  { desc: 'เมื่อเริ่มทำการติดตั้งวัสดุ หน้างาน', percent: 30 },
  { desc: 'เมื่อเสร็จสิ้นงานตกแต่งภายใน', percent: 20 }
];
let paymentAccountName = 'กวิน แซ่ด่าน';
let paymentBankName = 'กสิกรไทย';
let paymentAccountNumber = '7722005982';

function fmt(n){ return Math.round(n).toLocaleString('th-TH'); }
function getCat(id){ return CATS.find(c=>c.id===id); }
function roomCountFor(sectionId){ return rooms.filter(r=>r.sectionId===sectionId).length; }

/* ===== right pane: zone / room / category navigation ===== */
function setAppMode(mode){
  appMode = mode;
  if(mode === 'terms'){
    const { totalPages } = computeDocumentPages(true);
    previewPageIndex = totalPages - 1;
  } else {
    previewPageIndex = 0;
  }
  renderMenu();
  renderPreview();
}

function syncModeToggleUI(){
  document.getElementById('modePillQuotation').classList.toggle('active', appMode === 'quotation');
  document.getElementById('modePillTerms').classList.toggle('active', appMode === 'terms');
  document.getElementById('appSubtitle').style.display = appMode === 'quotation' ? '' : 'none';
}

function termsOfPaymentHTML(){
  const totalPercent = paymentInstallments.reduce((s,i) => s + (parseFloat(i.percent)||0), 0);

  const rows = paymentInstallments.map((inst, i) => `
    <div class="list-row" draggable="true" data-id="${i}"
         ondragstart="onInstallmentDragStart(event)"
         ondragover="onRowDragOver(event)"
         ondrop="onRowDrop(event)"
         ondragend="onRowDragEnd(event)">
      <span class="drag-handle">⠿</span>
      <div class="main" style="display:flex; flex-direction:column; gap:4px;">
        <input type="text" value="${inst.desc}" placeholder="เช่น เมื่อชำระเงิน" style="border:none; background:transparent; font-size:13.5px; font-weight:600; padding:0; width:100%;" oninput="updateInstallment(${i}, 'desc', this.value)">
      </div>
      <div class="actions" style="align-items:center;">
        <input type="number" min="0" max="100" value="${inst.percent}" style="width:48px; border:1px solid var(--line); border-radius:6px; padding:4px; font-size:12.5px; text-align:right;" oninput="updateInstallment(${i}, 'percent', this.value)">
        <span style="font-size:12px; color:var(--ink-soft);">%</span>
        <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); deleteInstallment(${i})">✕</button>
      </div>
    </div>`).join('');

  return `
    <div class="breadcrumb-bar">
      <h2>เงื่อนไขการชำระเงิน</h2>
    </div>
    <div style="padding:18px 28px;">
      <div class="field">
        <label>งวดการชำระเงิน (ลากสลับลำดับได้)</label>
        <div class="zone-list" style="padding:0;">${rows}</div>
        <div class="add-list-row" onclick="addInstallment()" style="margin-top:8px;">
          <span class="plus">+</span> เพิ่มงวด
        </div>
        <div class="hint" id="installmentTotalHint" style="${totalPercent !== 100 ? 'color:#B5482F; font-weight:600;' : ''}">รวมทั้งหมด ${totalPercent}% ${totalPercent !== 100 ? '(ควรรวมให้ครบ 100%)' : ''}</div>
      </div>
      <div class="field">
        <label>ชื่อบัญชี</label>
        <input type="text" value="${paymentAccountName}" oninput="paymentAccountName = this.value; renderPreview();">
      </div>
      <div class="field">
        <label>ธนาคาร</label>
        <input type="text" value="${paymentBankName}" oninput="paymentBankName = this.value; renderPreview();">
      </div>
      <div class="field">
        <label>เลขที่บัญชี</label>
        <input type="text" value="${paymentAccountNumber}" oninput="paymentAccountNumber = this.value; renderPreview();">
      </div>
    </div>`;
}

function addInstallment(){
  paymentInstallments.push({ desc: '', percent: 0 });
  renderMenu();
  renderPreview();
}
function deleteInstallment(idx){
  paymentInstallments.splice(idx, 1);
  renderMenu();
  renderPreview();
}
function updateInstallment(idx, field, value){
  paymentInstallments[idx][field] = field === 'percent' ? (parseFloat(value) || 0) : value;
  if(field === 'percent') updateInstallmentTotalHint();
  renderPreview();
}
function updateInstallmentTotalHint(){
  const hint = document.getElementById('installmentTotalHint');
  if(!hint) return;
  const totalPercent = paymentInstallments.reduce((s,i) => s + (parseFloat(i.percent)||0), 0);
  hint.textContent = `รวมทั้งหมด ${totalPercent}% ${totalPercent !== 100 ? '(ควรรวมให้ครบ 100%)' : ''}`;
  hint.style.color = totalPercent !== 100 ? '#B5482F' : '';
  hint.style.fontWeight = totalPercent !== 100 ? '600' : '';
}
function onInstallmentDragStart(e){
  dragSrcEl = e.currentTarget;
  dragSrcKind = 'installment';
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  e.currentTarget.classList.add('dragging');
}
function commitInstallmentOrder(){
  const indices = Array.from(document.querySelectorAll('#menuArea .zone-list > .list-row[data-id]'))
    .map(el => parseInt(el.dataset.id));
  paymentInstallments = indices.map(idx => paymentInstallments[idx]);
  renderMenu();
  renderPreview();
}

function renderMenu(){
  syncModeToggleUI();
  const area = document.getElementById('menuArea');

  if(appMode === 'terms'){
    area.innerHTML = termsOfPaymentHTML();
    return;
  }

  if(view === 'sections'){
    area.innerHTML = sectionsHTML();
  } else if(view === 'rooms'){
    area.innerHTML = roomsHTML();
  } else {
    area.innerHTML = itemsShellHTML();
    renderTabs();
    renderGrid();
  }
}

function sectionsHTML(){
  const rows = sections.map(s => `
    <div class="list-row" draggable="true" data-id="${s.id}"
         ondragstart="onSectionDragStart(event)"
         ondragover="onRowDragOver(event)"
         ondrop="onRowDrop(event)"
         ondragend="onRowDragEnd(event)">
      <span class="drag-handle">⠿</span>
      <div class="bar"></div>
      <div class="main" onclick="enterSection(${s.id})">
        <div class="nm">${s.name}</div>
        <div class="sub">${roomCountFor(s.id)} ห้อง</div>
      </div>
      <div class="actions">
        <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); openEditSectionModal(${s.id})">✎</button>
        <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); deleteSection(${s.id})">✕</button>
      </div>
    </div>`).join('');
  return `
    <div class="breadcrumb-bar"><h2>เลือก พื้นที่</h2></div>
    <div class="pane-scroll">
      <div class="zone-list" ondragover="onListDragOver(event)">
        ${rows}
        <div class="add-list-row" onclick="openAddSectionModal()">
          <span class="plus">+</span> เพิ่ม
        </div>
      </div>
    </div>`;
}

function roomsHTML(){
  const sec = sections.find(s => s.id === currentSectionId);
  const myRooms = rooms.filter(r => r.sectionId === currentSectionId);
  const rows = myRooms.map(r => `
    <div class="list-row" draggable="true" data-id="${r.id}"
         ondragstart="onRoomDragStart(event)"
         ondragover="onRowDragOver(event)"
         ondrop="onRowDrop(event)"
         ondragend="onRowDragEnd(event)">
      <span class="drag-handle">⠿</span>
      <div class="bar room"></div>
      <div class="main" onclick="enterRoom(${r.id})">
        <div class="nm">${r.name}</div>
      </div>
      <div class="actions">
        <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); openEditRoomModal(${r.id})">✎</button>
        <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); deleteRoom(${r.id})">✕</button>
      </div>
    </div>`).join('');
  return `
    <div class="breadcrumb-bar">
      <span class="back-link" onclick="backToSections()">← พื้นที่ใหญ่</span>
      <h2>${sec.name}</h2>
    </div>
    <div class="pane-scroll">
      <div class="zone-list" ondragover="onListDragOver(event)">
        ${rows}
        <div class="add-list-row" onclick="openAddRoomModal(${currentSectionId})">
          <span class="plus">+</span> เพิ่มห้อง
        </div>
      </div>
    </div>`;
}

function getRoomCatOrder(roomId){
  const room = rooms.find(r => r.id === roomId);
  if(!room) return [];
  const sec = sections.find(s => s.id === room.sectionId);
  if(!sec) return [];
  const roomItems = cart.filter(i => i.roomName === room.name && i.sectionName === sec.name);
  const present = [];
  roomItems.forEach(i => { if(!present.includes(i.catId)) present.push(i.catId); });
  if(room.catOrder && room.catOrder.length){
    const ordered = room.catOrder.filter(id => present.includes(id));
    present.forEach(id => { if(!ordered.includes(id)) ordered.push(id); });
    return ordered;
  }
  return present;
}

function allRoomItemsHTML(room, sec, catIds){
  if(!catIds.length) return '';

  const groups = catIds.map(catId => {
    const cat = getCat(catId);
    if(!cat) return '';
    const items = cart.filter(i => i.catId === catId && i.roomName === room.name && i.sectionName === sec.name);
    if(!items.length) return '';
    const groupKey = `${room.id}_${catId}`;

    const rows = items.map((it) => `
      <div class="list-row added-item-row" draggable="true" data-cart-id="${it.id}" data-room-item-group="${groupKey}"
           ondragstart="onRoomItemDragStart(event, '${groupKey}')"
           ondragover="onRoomItemRowDragOver(event, '${groupKey}')"
           ondrop="onRowDrop(event)"
           ondragend="onRoomItemDragEnd(event)">
        <span class="drag-handle">⠿</span>
        <div class="bar" style="background:${cat.color}"></div>
        <div class="main">
          <div class="nm">${it.itemName || '(ไม่ระบุชื่อ)'}</div>
          <div class="sub">${it.materialName ? it.materialName + ' · ' : ''}${it.qty} ${it.unitLabel} × <span class="num">${fmt(it.price)}</span> = <span class="num">${fmt(it.subtotal)}</span></div>
        </div>
        <div class="actions">
          <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); openEditItemModal(${it.id})">✎</button>
          <button class="card-icon-btn" draggable="false" onclick="event.stopPropagation(); removeItem(${it.id})">✕</button>
        </div>
      </div>`).join('');

    return `
      <div class="all-items-cat-group" draggable="true" data-id="${catId}"
           ondragstart="onRoomCatDragStart(event)"
           ondragover="onRoomCatRowDragOver(event)"
           ondrop="onRowDrop(event)"
           ondragend="onRowDragEnd(event)">
        <div class="all-items-cat-label">
          <span class="drag-handle">⠿</span>
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${cat.color};vertical-align:middle"></span>${cat.name}
        </div>
        <div class="zone-list compact-list">${rows}</div>
      </div>`;
  }).join('');

  return `
    <div class="room-cat-order">
      <div class="room-cat-order-label">รายการทั้งหมดในห้องนี้ (ทุกหมวดงาน)</div>
      ${groups}
    </div>`;
}

function itemsShellHTML(){
  const sec = sections.find(s => s.id === currentSectionId);
  const room = rooms.find(r => r.id === currentRoomId);
  const catIds = getRoomCatOrder(currentRoomId);

  return `
    <div class="breadcrumb-bar">
      <span class="back-link" onclick="backToRooms()">← ${sec.name}</span>
      <h2>${room.name}</h2>
    </div>
    ${allRoomItemsHTML(room, sec, catIds)}
    <div class="items-layout">
      <nav class="cat-list" id="catTabs"></nav>
      <main class="item-grid" id="itemGrid"></main>
    </div>`;
}

function enterSection(id){ currentSectionId = id; view = 'rooms'; renderMenu(); }
function backToSections(){ view = 'sections'; renderMenu(); }
function enterRoom(id){ currentRoomId = id; view = 'items'; renderMenu(); }
function backToRooms(){ view = 'rooms'; renderMenu(); }

function deleteSection(id){
  sections = sections.filter(s => s.id !== id);
  rooms = rooms.filter(r => r.sectionId !== id);
  renderMenu();
  renderPreview();
}
function deleteRoom(id){
  rooms = rooms.filter(r => r.id !== id);
  renderMenu();
  renderPreview();
}

let dragSrcId = null;

let dragSrcEl = null;
let dragSrcKind = null; // 'section' | 'room'

function onRowDragOver(e){
  e.preventDefault();
  const row = e.currentTarget;
  if(!dragSrcEl || row === dragSrcEl) return;
  const rect = row.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  row.parentNode.insertBefore(dragSrcEl, before ? row : row.nextSibling);
}
function onListDragOver(e){
  if(!dragSrcEl) return;
  e.preventDefault();
  if(e.target === e.currentTarget){
    e.currentTarget.insertBefore(dragSrcEl, e.currentTarget.querySelector('.add-list-row'));
  }
}
function onRowDrop(e){
  e.preventDefault();
}
function onRowDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  if(dragSrcKind === 'section') commitSectionOrder();
  else if(dragSrcKind === 'room') commitRoomOrder();
  else if(dragSrcKind === 'material') commitMaterialOrder();
  else if(dragSrcKind === 'roomcat') commitRoomCatOrder();
  else if(dragSrcKind === 'installment') commitInstallmentOrder();
  dragSrcEl = null;
  dragSrcKind = null;
}

function onRoomCatDragStart(e){
  dragSrcEl = e.currentTarget;
  dragSrcKind = 'roomcat';
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  e.currentTarget.classList.add('dragging');
}
function onRoomCatRowDragOver(e){
  if(!dragSrcEl || dragSrcKind !== 'roomcat') return;
  e.preventDefault();
  const row = e.currentTarget;
  if(row === dragSrcEl) return;
  const rect = row.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  row.parentNode.insertBefore(dragSrcEl, before ? row : row.nextSibling);
}

/* ===== in-page notifications (alert()/confirm() can be silently
   blocked when this artifact runs inside a sandboxed iframe, so these
   are plain DOM elements instead -- they always render) ===== */
function showToast(message, isError){
  const frame = document.getElementById('appFrame');
  const existing = frame.querySelector('.toast');
  if(existing) existing.remove();
  const toast = document.createElement('div');
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.innerHTML = `<span>${message}</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>`;
  frame.appendChild(toast);
  setTimeout(() => { if(toast.parentElement) toast.remove(); }, 9000);
}

  document.getElementById('confirmYesBtn').onclick = () => { closeModal(); onConfirm(); };

}

    <button class="btn btn-primary" id="addBtn" onclick="addToCart()" disabled>เพิ่มลงรายการ</button>
  `;
}

function bindModalEvents(cat){
  const matSel = document.getElementById('f-material');
  const priceInput = document.getElementById('f-price');

  if(matSel){
    const customInput = document.getElementById('f-custommat');
    matSel.addEventListener('change', () => {
      if(matSel.value === '__custom__'){
        customInput.style.display = 'block';
        priceInput.value = 0;
      } else {
        customInput.style.display = 'none';
        const opt = matSel.selectedOptions[0];
        priceInput.value = opt.dataset.price || 0;
      }
      updateModalTotal();
    });
  }

  if(cat.customOnly){
    document.getElementById('f-itemname').addEventListener('change', updateModalTotal);
    document.getElementById('f-spec').addEventListener('input', updateModalTotal);
    const worktypeEl = document.getElementById('f-worktype');
    if(worktypeEl) worktypeEl.addEventListener('change', updateModalTotal);
  }

  document.getElementById('f-itemname').addEventListener('input', updateModalTotal);
  priceInput.addEventListener('input', updateModalTotal);

  if(cat.unit === 'area'){
    document.getElementById('f-area').addEventListener('input', updateModalTotal);
  } else if(cat.unit === 'wh'){
    const unitSel = document.getElementById('f-unit');
    const wEl = document.getElementById('f-width');
    const lEl = document.getElementById('f-length');
    const hEl = document.getElementById('f-height');
    const qtyEl = document.getElementById('f-qty');

    const suggestQty = () => {
      const w = parseFloat(wEl.value) || 0;
      const l = parseFloat(lEl.value) || 0;
      const h = parseFloat(hEl.value) || 0;
      let q;
      if(unitSel.value === 'ตร.ม.') q = +(w*h).toFixed(2);
      else if(unitSel.value === 'เมตร') q = +l.toFixed(2);
      else q = 1;
      qtyEl.value = q;
      updateModalTotal();
    };

    unitSel.addEventListener('change', suggestQty);
    wEl.addEventListener('input', suggestQty);
    lEl.addEventListener('input', suggestQty);
    hEl.addEventListener('input', suggestQty);
    qtyEl.addEventListener('input', updateModalTotal);
  } else {
    document.getElementById('f-points').addEventListener('input', updateModalTotal);
  }
}

function currentQty(cat){
  if(cat.unit === 'area'){
    return parseFloat(document.getElementById('f-area').value) || 0;
  } else if(cat.unit === 'wh'){
    return parseFloat(document.getElementById('f-qty').value) || 0;
  } else {
    return parseInt(document.getElementById('f-points').value) || 0;
  }
}

function updateModalTotal(){
  const cat = pending.cat;
  const price = parseFloat(document.getElementById('f-price').value) || 0;
  const qty = currentQty(cat);

  const total = price * qty;
  document.getElementById('modalTotal').textContent = fmt(total);

  const itemName = document.getElementById('f-itemname').value.trim();
  document.getElementById('addBtn').disabled = !(itemName && qty > 0);
}

function readItemFormValues(cat){
  const matSel = document.getElementById('f-material');
  const materialName = matSel
    ? (matSel.value === '__custom__' ? (document.getElementById('f-custommat').value.trim() || 'ระบุเอง') : matSel.value)
    : (document.getElementById('f-spec') ? (document.getElementById('f-spec').value.trim() || '-') : '');
  const price = parseFloat(document.getElementById('f-price').value) || 0;
  const qty = currentQty(cat);

  let itemName, dims, unitLabel;
  if(cat.unit === 'wh'){
    const typed = document.getElementById('f-itemname').value.trim();
    itemName = `${pending.furnitureCode} ${typed}`;
    const w = parseFloat(document.getElementById('f-width').value) || 0;
    const l = parseFloat(document.getElementById('f-length').value) || 0;
    const h = parseFloat(document.getElementById('f-height').value) || 0;
    dims = `${w} × ${l} × ${h} ม.`;
    unitLabel = document.getElementById('f-unit').value;
  } else if(cat.customOnly){
    itemName = document.getElementById('f-itemname').value.trim();
    const worktypeEl = document.getElementById('f-worktype');
    dims = worktypeEl ? worktypeEl.value : '';
    unitLabel = UNIT_LABEL[cat.unit];
  } else {
    itemName = document.getElementById('f-itemname').value.trim();
    dims = '';
    unitLabel = UNIT_LABEL[cat.unit];
  }

  return { itemName, materialName, dims, qty, unitLabel, price, subtotal: price * qty };
}

function addToCart(){
  const cat = pending.cat;
  const vals = readItemFormValues(cat);

  cart.push({
    id: nextId++,
    catId: cat.id,
    catName: cat.name,
    color: cat.color,
    sectionName: sections.find(s => s.id === currentSectionId).name,
    roomName: rooms.find(r => r.id === currentRoomId).name,
    ...vals
  });

  if(cat.unit === 'wh') furnitureCounter++;

  closeModal();
  renderMenu();
  renderPreview();
}

function openEditItemModal(itemId){
  const item = cart.find(i => i.id === itemId);
  if(!item) return;
  const cat = getCat(item.catId);
  if(!cat) return;

  let furnitureCode = null;
  if(cat.unit === 'wh'){
    const m = item.itemName.match(/^(\S+)/);
    furnitureCode = m ? m[1] : ('J-' + (furnitureCounter < 10 ? '0' + furnitureCounter : furnitureCounter));
  }

  pending = { cat, material: null, furnitureCode, editId: item.id };
  document.getElementById('modalTitle').textContent = 'แก้ไขรายการ';
  document.getElementById('modalBody').innerHTML = buildModalForm(cat, null);
  document.getElementById('modalOverlay').hidden = false;
  bindModalEvents(cat);
  prefillModalForEdit(item, cat);

  const btn = document.getElementById('addBtn');
  if(btn){
    btn.textContent = 'บันทึกการแก้ไข';
    btn.onclick = saveEditedItem;
  }
  updateModalTotal();
}

function prefillModalForEdit(item, cat){
  const cleanMaterial = (item.materialName === '-' || item.materialName === 'ระบุเอง') ? '' : (item.materialName || '');

  if(cat.unit === 'wh'){
    document.getElementById('f-itemname').value = item.itemName.replace(/^\S+\s*/, '');
    document.getElementById('f-spec').value = cleanMaterial;
    document.getElementById('f-unit').value = item.unitLabel;
    document.getElementById('f-price').value = item.price;
    const m = (item.dims || '').match(/^([\d.]+)\s*×\s*([\d.]+)\s*×\s*([\d.]+)/);
    if(m){
      document.getElementById('f-width').value = m[1];
      document.getElementById('f-length').value = m[2];
      document.getElementById('f-height').value = m[3];
    }
    document.getElementById('f-qty').value = item.qty;
  } else if(cat.customOnly){
    document.getElementById('f-itemname').value = item.itemName;
    document.getElementById('f-spec').value = cleanMaterial;
    const worktypeEl = document.getElementById('f-worktype');
    if(worktypeEl && item.dims) worktypeEl.value = item.dims;
    document.getElementById('f-price').value = item.price;
    document.getElementById('f-area').value = item.qty;
  } else {
    document.getElementById('f-itemname').value = item.itemName;
    const matSel = document.getElementById('f-material');
    const customInput = document.getElementById('f-custommat');
    const hasPreset = Array.from(matSel.options).some(o => o.value === item.materialName);
    if(hasPreset){
      matSel.value = item.materialName;
      customInput.style.display = 'none';
    } else {
      matSel.value = '__custom__';
      customInput.value = cleanMaterial;
      customInput.style.display = 'block';
    }
    document.getElementById('f-price').value = item.price;
    if(cat.unit === 'area'){
      document.getElementById('f-area').value = item.qty;
    } else {
      document.getElementById('f-points').value = item.qty;
    }
  }
}

  const cat = pending.cat;

function buildZonesData(){
  const zones = [];
  sections.forEach(s => {
    const sectionItems = cart.filter(i => i.sectionName === s.name);
    if(sectionItems.length === 0) return;
    const zoneRooms = [];
    rooms.filter(r => r.sectionId === s.id).forEach(r => {
      const roomItems = sectionItems.filter(i => i.roomName === r.name);
      if(roomItems.length === 0) return;
      const cats = [];
      roomItems.forEach(i => {
        let c = cats.find(c => c.catId === i.catId);
        if(!c){ c = {catId:i.catId, name:i.catName, items:[]}; cats.push(c); }
        c.items.push(i);
      });
      if(r.catOrder && r.catOrder.length){
        cats.sort((a,b) => {
          let ia = r.catOrder.indexOf(a.catId); if(ia === -1) ia = 999;
          let ib = r.catOrder.indexOf(b.catId); if(ib === -1) ib = 999;
          return ia - ib;
        });
      }
      zoneRooms.push({name: r.name, cats});
    });
    if(zoneRooms.length > 0) zones.push({name: s.name, rooms: zoneRooms});
  });
  return zones;
}

function downloadCSV(){
  const dateStr = new Date().toLocaleDateString('th-TH');

  let lines = [
    ['QUOTATION'],
    ['owner', ownerName],
    ['project', projectName],
    ['date', dateStr],
    ['issuer', companyName, companyAddr],
    [],
    ['No.','ส่วน','ห้อง','หมวดหมู่','List','ชนิด/วัสดุ','ขนาด(กว้างxสูง)','Qty.','Unit','Price','Total']
  ];
  const zones = buildZonesData();

  let subtotal = 0;
  zones.forEach((z, zi) => {
    const zoneNo = zi + 1;
    const zoneTotal = z.rooms.reduce((s,r) => s + r.cats.reduce((s2,c) => s2 + c.items.reduce((s3,i)=>s3+i.subtotal,0), 0), 0);
    subtotal += zoneTotal;
    lines.push([zoneNo, z.name, '', '', '', '', '', '', '', '', Math.round(zoneTotal)]);
    z.rooms.forEach((r, ri) => {
      const roomNo = `${zoneNo}.${ri+1}`;
      lines.push([roomNo, '', r.name, '', '', '', '', '', '', '', '']);
      r.cats.forEach((c, ci) => {
        const catNo = `${roomNo}.${ci+1}`;
        lines.push([catNo, '', '', c.name, '', '', '', '', '', '', '']);
        c.items.forEach((it, ii) => {
          const itemNo = `${catNo}.${ii+1}`;
          lines.push([itemNo, z.name, r.name, it.catName, it.itemName, it.materialName, it.dims, it.qty, it.unitLabel, it.price, it.subtotal]);
        });
      });
    });
  });
  const fee = serviceFeeChecked ? subtotal * 0.10 : 0;
  const vat = vatChecked ? subtotal * 0.07 : 0;
  const grand = subtotal + fee + vat;
  lines.push([]);
  lines.push(['','','','','','','','','','รวมก่อนภาษี', Math.round(subtotal)]);
  if(serviceFeeChecked) lines.push(['','','','','','','','','','ค่าดำเนินการ 10%', Math.round(fee)]);
  if(vatChecked) lines.push(['','','','','','','','','','VAT 7%', Math.round(vat)]);
  lines.push(['','','','','','','','','','รวมทั้งสิ้น', Math.round(grand)]);

  const csv = lines.map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ใบเสนอราคา_${projectName || 'ไม่ระบุชื่อ'}_${dateStr}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ===== CSV upload (re-import a previously downloaded quotation) ===== */
function parseCSVLine(line){
  const result = [];
  let cur = '';
  let inQuotes = false;
  for(let i = 0; i < line.length; i++){
    const ch = line[i];
    if(inQuotes){
      if(ch === '"'){
        if(line[i+1] === '"'){ cur += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cur += ch;
      }
    } else {
      if(ch === '"'){ inQuotes = true; }
      else if(ch === ','){ result.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  result.push(cur);
  return result;
}

function handleCSVUpload(file){
  if(!file) return;
  document.getElementById('csvFileInput').value = '';
  openConfirmModal('การอัปโหลดจะแทนที่ข้อมูลพื้นที่/ห้อง/รายการทั้งหมดที่มีอยู่ในแอพตอนนี้ ต้องการดำเนินการต่อหรือไม่?', () => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        rebuildFromCSV(e.target.result);
        showToast('นำเข้าข้อมูลจาก CSV สำเร็จแล้ว');
      } catch(err){
        console.error('CSV import failed:', err);
        showToast('อ่านไฟล์ CSV ไม่สำเร็จ กรุณาตรวจสอบว่าเป็นไฟล์ที่ดาวน์โหลดจากแอพนี้', true);
      }
    };
    reader.onerror = () => {
      showToast('อ่านไฟล์ไม่สำเร็จ', true);
    };
    reader.readAsText(file, 'utf-8');
  });
}

function rebuildFromCSV(text){
  if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  const rows = lines.map(parseCSVLine);

  let parsedOwner = '', parsedProject = '', parsedCompany = '', parsedAddr = '';
  let parsedVat = false;
  let parsedFee = false;
  const itemRows = [];

  rows.forEach(cols => {
    const first = (cols[0] || '').trim();
    if(first === 'owner'){ parsedOwner = cols[1] || ''; }
    else if(first === 'project'){ parsedProject = cols[1] || ''; }
    else if(first === 'issuer'){ parsedCompany = cols[1] || ''; parsedAddr = cols[2] || ''; }
    else if((cols[9] || '').trim() === 'VAT 7%'){ parsedVat = true; }
    else if((cols[9] || '').trim() === 'ค่าดำเนินการ 10%'){ parsedFee = true; }
    else if(cols.length >= 11 && cols[1] && cols[2] && cols[3] && cols[4] &&
            cols[1].trim() && cols[2].trim() && cols[3].trim() && cols[4].trim()){
      itemRows.push(cols);
    }
  });

  if(itemRows.length === 0){
    showToast('ไม่พบรายการในไฟล์ CSV นี้ (ต้องเป็นไฟล์ที่ดาวน์โหลดจากแอพนี้)', true);
    return;
  }

  sections = [];
  rooms = [];
  cart = [];
  nextSectionId = 1;
  nextRoomId = 1;
  nextId = 1;

  const sectionMap = {};
  const roomMap = {};

  itemRows.forEach(cols => {
    const zoneName = cols[1].trim();
    const roomName = cols[2].trim();
    const catName = cols[3].trim();
    const itemName = cols[4].trim();
    const materialName = (cols[5] || '').trim();
    const dims = (cols[6] || '').trim();
    const qty = parseFloat(String(cols[7]).replace(/,/g,'')) || 0;
    const unitLabel = (cols[8] || '').trim();
    const price = parseFloat(String(cols[9]).replace(/,/g,'')) || 0;
    const subtotal = parseFloat(String(cols[10]).replace(/,/g,'')) || 0;

    let sectionId = sectionMap[zoneName];
    if(!sectionId){
      sectionId = nextSectionId++;
      sections.push({id: sectionId, name: zoneName});
      sectionMap[zoneName] = sectionId;
    }

    const roomKey = sectionId + '|' + roomName;
    let roomId = roomMap[roomKey];
    if(!roomId){
      roomId = nextRoomId++;
      rooms.push({id: roomId, sectionId, name: roomName});
      roomMap[roomKey] = roomId;
    }

    let cat = CATS.find(c => c.name === catName);
    if(!cat){
      const color = CUSTOM_CAT_COLORS[customCatCounter % CUSTOM_CAT_COLORS.length];
      customCatCounter++;
      cat = {id: 'custom' + Date.now() + Math.floor(Math.random()*1000), name: catName, color, unit:'area', materials:[]};
      CATS.push(cat);
    }

    cart.push({
      id: nextId++,
      catId: cat.id,
      catName: cat.name,
      color: cat.color,
      sectionName: zoneName,
      roomName: roomName,
      itemName, materialName, dims,
      qty, unitLabel,
      price, subtotal
    });
  });

  ownerName = parsedOwner;
  projectName = parsedProject;
  companyName = parsedCompany;
  companyAddr = parsedAddr;
  vatChecked = parsedVat;
  const vatCheckEl = document.getElementById('vatCheck');
  if(vatCheckEl) vatCheckEl.checked = parsedVat;
  serviceFeeChecked = parsedFee;
  const feeCheckEl = document.getElementById('feeCheck');
  if(feeCheckEl) feeCheckEl.checked = parsedFee;

  view = 'sections';
  currentSectionId = null;
  currentRoomId = null;

  renderMenu();
  renderPreview();
}

async function downloadPdf(){
  if(typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined'){
    showToast('โหลดไลบรารีสร้าง PDF ไม่สำเร็จ (ต้องมีอินเทอร์เน็ต) กำลังเปิดหน้าต่างพิมพ์แทน', true);
    printPaper();
    return;
  }
  if(cart.length === 0){
    showToast('ยังไม่มีรายการในใบเสนอราคา', true);
    return;
  }

  const btn = document.querySelector('.pdf-btn:not(.capture-btn)');
  const originalLabel = btn.innerHTML;
  btn.innerHTML = 'กำลังสร้าง PDF...';
  btn.disabled = true;

  try {
    const images = await buildAndCapturePages();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    images.forEach((img, idx) => {
      if(idx > 0) pdf.addPage();
      pdf.addImage(img, 'JPEG', 0, 0, 210, 297);
    });
    const dateStr = new Date().toLocaleDateString('th-TH');
    pdf.save(`ใบเสนอราคา_${projectName || 'ไม่ระบุชื่อ'}_${dateStr}.pdf`);
  } catch(err){
    console.error('PDF generation failed:', err);
    showToast('สร้าง PDF ไม่สำเร็จ: ' + err.message, true);
  } finally {
    btn.innerHTML = originalLabel;
    btn.disabled = false;
  }
}

/* ===== capture as multi-page JPEG images (row-aware pagination) ===== */
function html2canvasFixInputs(clonedDoc, pageId){
  const root = clonedDoc.getElementById(pageId);
  if(!root) return;
  root.querySelectorAll('input, textarea').forEach(el => {
    const cs = window.getComputedStyle(el);
    const isTextarea = el.tagName === 'TEXTAREA';
    const replacement = clonedDoc.createElement(isTextarea ? 'div' : 'span');
    replacement.textContent = el.value || '';
    replacement.style.font = cs.font;
    replacement.style.fontFamily = cs.fontFamily;
    replacement.style.fontSize = cs.fontSize;
    replacement.style.fontWeight = cs.fontWeight;
    replacement.style.color = cs.color;
    replacement.style.textAlign = cs.textAlign;
    replacement.style.width = cs.width;
    replacement.style.lineHeight = cs.lineHeight;
    replacement.style.padding = cs.padding;
    replacement.style.margin = cs.margin;
    replacement.style.borderBottom = cs.borderBottom;
    replacement.style.boxSizing = cs.boxSizing;
    replacement.style.display = isTextarea ? 'block' : 'inline-block';
    replacement.style.whiteSpace = isTextarea ? 'pre-wrap' : 'nowrap';
    replacement.style.verticalAlign = 'top';
    el.parentNode.replaceChild(replacement, el);
  });
}

function buildFlatRowList(zones, interactive){
  const rowList = [];
  let roomCounter = 0;
  zones.forEach(z => {
    const zoneTotal = z.rooms.reduce((s,r) => s + r.cats.reduce((s2,c) => s2 + c.items.reduce((s3,i)=>s3+i.subtotal,0), 0), 0);
    rowList.push(`<tr class="zoneband"><td></td><td>${z.name}</td><td></td><td></td><td></td><td class="r num">${fmt(zoneTotal)}</td></tr>`);
    z.rooms.forEach((r) => {
      roomCounter++;
      const roomNo = `${roomCounter}`;
      rowList.push(`<tr class="roomhead"><td>${roomNo}</td><td>${r.name}</td><td></td><td></td><td></td><td></td></tr>`);
      r.cats.forEach((c, ci) => {
        const catNo = `${roomNo}.${ci+1}`;
        rowList.push(`<tr class="cathead"><td>${catNo}</td><td>${c.name}</td><td></td><td></td><td></td><td></td></tr>`);
        c.items.forEach((it, ii) => {
          const itemNo = `${catNo}.${ii+1}`;
          if(interactive){
            const groupKey = `${r.id}_${c.catId}`;
            rowList.push(`<tr class="docitem" draggable="true" data-group="${groupKey}" data-cart-id="${it.id}"
              ondragstart="onItemDragStart(event, '${groupKey}')"
              ondragover="onItemRowDragOver(event, '${groupKey}')"
              ondrop="onRowDrop(event)"
              ondragend="onItemDragEnd(event)">
              <td class="num"><span class="row-drag-handle">⠿</span>${itemNo}</td>
              <td>${it.itemName}<div class="mat">${it.materialName}</div>${it.dims ? `<div class="dims">${it.dims}</div>` : ''}</td>
              <td class="r num">${it.qty}</td>
              <td>${it.unitLabel}</td>
              <td class="r num">${fmt(it.price)}</td>
              <td class="r num">${fmt(it.subtotal)}<button class="row-del" onclick="removeItem(${it.id})">✕</button></td>
            </tr>`);
          } else {
            rowList.push(`<tr class="docitem">
              <td class="num">${itemNo}</td>
              <td>${it.itemName}<div class="mat">${it.materialName}</div>${it.dims ? `<div class="dims">${it.dims}</div>` : ''}</td>
              <td class="r num">${it.qty}</td>
              <td>${it.unitLabel}</td>
              <td class="r num">${fmt(it.price)}</td>
              <td class="r num">${fmt(it.subtotal)}</td>
            </tr>`);
          }
        });
      });
    });
  });
  return rowList;
}

const DOC_TABLE_HEAD = '<tr><th>No.</th><th>List</th><th class="r">Qty.</th><th>Unit</th><th class="r">Price</th><th class="r">Total</th></tr>';

function buildSummaryRows(zones){
  const rowList = [];
  let roomCounter = 0;
  zones.forEach(z => {
    rowList.push(`<tr class="zoneband"><td></td><td>${z.name}</td><td></td><td></td><td></td><td></td></tr>`);
    z.rooms.forEach(r => {
      roomCounter++;
      const roomTotal = r.cats.reduce((s,c) => s + c.items.reduce((s2,i)=>s2+i.subtotal,0), 0);
      rowList.push(`<tr class="roomhead summary-room"><td>${roomCounter}</td><td>${r.name}</td><td></td><td></td><td></td><td class="r num">${fmt(roomTotal)}</td></tr>`);
    });
  });
  return rowList;
}

function summaryPageHTML(zones, subtotal, fee, vat, grand, dateStr, pageNum, totalPages){
  const rows = buildSummaryRows(zones);
  return `
    ${headerBlockHTML(dateStr, pageNum, totalPages, 'QUOTATION SUMMARY', 'สรุปรวมใบเสนอราคา')}
    <table class="doc-table">
      <thead>${DOC_TABLE_HEAD}</thead>
      <tbody>${rows.join('')}</tbody>
    </table>
    <div class="doc-totals">
      <div class="ln"><span>รวมก่อนภาษี</span><span class="num">${fmt(subtotal)}</span></div>
      ${serviceFeeChecked ? `<div class="ln"><span>ค่าดำเนินการ 10%</span><span class="num">${fmt(fee)}</span></div>` : ''}
      ${vatChecked ? `<div class="ln"><span>VAT 7%</span><span class="num">${fmt(vat)}</span></div>` : ''}
      <div class="ln grand"><span>รวมทั้งสิ้น</span><span class="num">${fmt(grand)}</span></div>
    </div>`;
}

function computeDocumentPages(interactive){
  const dateStr = new Date().toLocaleDateString('th-TH', {year:'numeric', month:'long', day:'numeric'});
  const summaryOffset = summaryEnabled ? 1 : 0;

  if(cart.length === 0){
    const totalPages = 2 + summaryOffset;
    const pageHtmls = [];
    if(summaryOffset) pageHtmls.push(summaryPageHTML([], 0, 0, 0, 0, dateStr, 1, totalPages));
    pageHtmls.push(
      `${headerBlockHTML(dateStr, 1 + summaryOffset, totalPages)}
       <table class="doc-table"><thead>${DOC_TABLE_HEAD}</thead></table>
       <div class="doc-empty">ยังไม่มีรายการ<br>เลือกพื้นที่ → ห้อง → หมวดหมู่งาน ทางด้านขวา เพื่อเริ่มเพิ่มรายการ</div>`
    );
    pageHtmls.push(`${headerBlockHTML(dateStr, totalPages, totalPages, 'TERMS OF PAYMENT', 'เงื่อนไขการชำระเงิน')}${termsBodyHTML(0)}`);
    return { pageHtmls, totalPages, dateStr };
  }

  const zones = buildZonesData();
  const rowHtmls = buildFlatRowList(zones, interactive);

  let subtotal = 0;
  zones.forEach(z => z.rooms.forEach(r => r.cats.forEach(c => c.items.forEach(i => { subtotal += i.subtotal; }))));
  const fee = serviceFeeChecked ? subtotal * 0.10 : 0;
  const vat = vatChecked ? subtotal * 0.07 : 0;
  const grand = subtotal + fee + vat;
  const totalsHtml = `
    <div class="doc-totals">
      <div class="ln"><span>รวมก่อนภาษี</span><span class="num">${fmt(subtotal)}</span></div>
      ${serviceFeeChecked ? `<div class="ln"><span>ค่าดำเนินการ 10%</span><span class="num">${fmt(fee)}</span></div>` : ''}
      ${vatChecked ? `<div class="ln"><span>VAT 7%</span><span class="num">${fmt(vat)}</span></div>` : ''}
      <div class="ln grand"><span>รวมทั้งสิ้น</span><span class="num">${fmt(grand)}</span></div>
    </div>
    <div class="doc-note">ต้นแบบนี้สร้างจากแอพสั่งงานอินทีเรีย ข้อมูลชุดนี้จะถูกส่งเข้า Google Sheets ตาม template โดยอัตโนมัติในระบบจริง</div>
  `;

  // ===== measuring stage (offscreen, never visible) =====
  const measureRoot = document.createElement('div');
  measureRoot.style.cssText = 'position:absolute; left:-99999px; top:0; width:210mm;';
  document.body.appendChild(measureRoot);

  const headerProbe = document.createElement('div');
  headerProbe.className = 'paper';
  headerProbe.style.minHeight = '0';
  headerProbe.innerHTML = headerBlockHTML(dateStr, 1, 1);
  measureRoot.appendChild(headerProbe);
  const headerBlockHeight = headerProbe.querySelector('.doc-head').offsetHeight +
    headerProbe.querySelector('.doc-meta').offsetHeight + 12;
  measureRoot.removeChild(headerProbe);

  const tableProbe = document.createElement('table');
  tableProbe.className = 'doc-table';
  tableProbe.style.width = '100%';
  tableProbe.innerHTML = `<thead>${DOC_TABLE_HEAD}</thead><tbody>${rowHtmls.join('')}</tbody>`;
  measureRoot.appendChild(tableProbe);
  const theadHeight = tableProbe.querySelector('thead tr').offsetHeight;
  const trEls = tableProbe.querySelectorAll('tbody tr');
  const rows = rowHtmls.map((html, idx) => ({ html, height: trEls[idx].offsetHeight }));
  measureRoot.removeChild(tableProbe);

  const totalsProbe = document.createElement('div');
  totalsProbe.innerHTML = totalsHtml;
  measureRoot.appendChild(totalsProbe);
  const totalsHeight = totalsProbe.offsetHeight;
  measureRoot.removeChild(totalsProbe);

  document.body.removeChild(measureRoot);

  // ===== pagination: never split a row across pages =====
  const mmToPx = mm => mm * 96 / 25.4;
  const PAGE_CONTENT_H = mmToPx(297 - 20 - 20);
  const page1Budget = PAGE_CONTENT_H - headerBlockHeight - theadHeight;
  const contBudget = PAGE_CONTENT_H - theadHeight;

  const pages = [];
  let current = [];
  let used = 0;
  let budget = page1Budget;
  let isFirst = true;

  rows.forEach(row => {
    if(used + row.height > budget && current.length > 0){
      pages.push({ rows: current, isFirst });
      current = [];
      used = 0;
      budget = contBudget;
      isFirst = false;
    }
    current.push(row);
    used += row.height;
  });
  if(current.length > 0 || pages.length === 0) pages.push({ rows: current, isFirst });

  const lastPage = pages[pages.length - 1];
  const lastBudget = lastPage.isFirst ? page1Budget : contBudget;
  const lastUsed = lastPage.rows.reduce((s,r) => s + r.height, 0);
  const totalsOnNewPage = (lastUsed + totalsHeight) > lastBudget;
  const totalPages = pages.length + (totalsOnNewPage ? 1 : 0) + 1 + summaryOffset; // +1 terms page, +1 summary page if enabled

  // ===== build per-page HTML =====
  const pageHtmls = [];

  if(summaryOffset){
    pageHtmls.push(summaryPageHTML(zones, subtotal, fee, vat, grand, dateStr, 1, totalPages));
  }

  pages.forEach((pg, i) => {
    const pageNum = i + 1 + summaryOffset;
    const isLastTablePage = (i === pages.length - 1) && !totalsOnNewPage;

    let html = '';
    if(pg.isFirst){
      html += headerBlockHTML(dateStr, pageNum, totalPages);
    } else {
      html += `<div class="doc-cont-page-label">Page ${pageNum}/${totalPages}</div>`;
    }
    html += `<table class="doc-table"><thead>${DOC_TABLE_HEAD}</thead><tbody>${pg.rows.map(r=>r.html).join('')}</tbody></table>`;
    if(isLastTablePage) html += totalsHtml;
    pageHtmls.push(html);
  });

  if(totalsOnNewPage){
    const pageNum = pages.length + 1 + summaryOffset;
    pageHtmls.push(`<div class="doc-cont-page-label">Page ${pageNum}/${totalPages}</div>${totalsHtml}`);
  }

  // Terms of Payment: always the last page
  pageHtmls.push(`${headerBlockHTML(dateStr, totalPages, totalPages, 'TERMS OF PAYMENT', 'เงื่อนไขการชำระเงิน')}${termsBodyHTML(grand)}`);

  return { pageHtmls, totalPages, dateStr };
}

async function buildAndCapturePages(){
  const { pageHtmls } = computeDocumentPages(false);

  const captureRoot = document.createElement('div');
  captureRoot.style.cssText = 'position:absolute; left:-99999px; top:0;';
  document.body.appendChild(captureRoot);

  const images = [];
  for(const html of pageHtmls){
    const pageEl = document.createElement('div');
    pageEl.id = 'capturePage';
    pageEl.className = 'paper capture-page';
    pageEl.innerHTML = html;
    captureRoot.appendChild(pageEl);

    const canvas = await html2canvas(pageEl, {
      scale: 2, backgroundColor: '#ffffff', useCORS: true,
      onclone: (clonedDoc) => html2canvasFixInputs(clonedDoc, 'capturePage')
    });
    images.push(canvas.toDataURL('image/jpeg', 0.92));
    captureRoot.removeChild(pageEl);
  }

  document.body.removeChild(captureRoot);
  return images;
}

async function captureAsImages(){
  if(typeof html2canvas === 'undefined'){
    showToast('โหลดไลบรารีแคปภาพไม่สำเร็จ (ต้องมีอินเทอร์เน็ต) ลองใหม่อีกครั้ง', true);
    return;
  }
  if(cart.length === 0){
    showToast('ยังไม่มีรายการในใบเสนอราคา', true);
    return;
  }

  const btn = document.querySelector('.capture-btn');
  const originalLabel = btn.innerHTML;
  btn.innerHTML = 'กำลังสร้างภาพ...';
  btn.disabled = true;

  try {
    const images = await buildAndCapturePages();
    openCaptureViewer(images);
  } catch(err){
    console.error('Capture failed:', err);
    showToast('สร้างภาพไม่สำเร็จ: ' + err.message, true);
  } finally {
    btn.innerHTML = originalLabel;
    btn.disabled = false;
  }
}

let captureImages = [];
let captureIndex = 0;

function openCaptureViewer(images){
  captureImages = images;
  captureIndex = 0;
  document.getElementById('captureViewer').hidden = false;
  renderCaptureViewer();
}
function renderCaptureViewer(){
  document.getElementById('captureImg').src = captureImages[captureIndex];
  document.getElementById('capturePageLabel').textContent = `หน้า ${captureIndex+1}/${captureImages.length}`;
  document.getElementById('captureNavPrevBtn').disabled = captureIndex === 0;
  document.getElementById('captureNavNextBtn').disabled = captureIndex === captureImages.length - 1;
}
function captureNavPrev(){ if(captureIndex > 0){ captureIndex--; renderCaptureViewer(); } }
function captureNavNext(){ if(captureIndex < captureImages.length - 1){ captureIndex++; renderCaptureViewer(); } }
function closeCaptureViewer(){
  document.getElementById('captureViewer').hidden = true;
  captureImages = [];
}

document.getElementById('vatCheck').addEventListener('change', e => { vatChecked = e.target.checked; renderPreview(); });
document.getElementById('feeCheck').addEventListener('change', e => { serviceFeeChecked = e.target.checked; renderPreview(); });
document.getElementById('summaryCheck').addEventListener('change', e => { summaryEnabled = e.target.checked; renderPreview(); });

/* ===== desktop / iOS device mode ===== */
function setDeviceMode(mode){
  const frame = document.getElementById('appFrame');
  document.getElementById('dsDesktop').classList.toggle('active', mode === 'desktop');
  document.getElementById('dsIos').classList.toggle('active', mode === 'ios');
  if(mode === 'ios'){
    frame.classList.add('ios-mode');
    showIosScreen('menu');
  } else {
    frame.classList.remove('ios-mode');
    currentZoom = 1;
    applyZoom();
  }
}
function showIosScreen(screen){
  const frame = document.getElementById('appFrame');
  frame.classList.remove('screen-menu','screen-preview');
  frame.classList.add(screen === 'preview' ? 'screen-preview' : 'screen-menu');
  document.getElementById('tabMenu').classList.toggle('active', screen === 'menu');
  document.getElementById('tabPreview').classList.toggle('active', screen === 'preview');
  // Note: preview intentionally always opens at 100% scale (currentZoom
  // stays as-is, default 1) so fonts/table sizing render identically to
  // desktop. Pinch or double-tap to zoom out and see the full page --
  // it's no longer applied automatically.
}

/* ===== pinch-to-zoom on the A4 preview (touch devices) ===== */
let currentZoom = 1;
let pinchStartDist = 0;
let pinchStartZoom = 1;
let lastTapTime = 0;

function getTouchDist(touches){
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function applyZoom(){
  const wrap = document.getElementById('paperZoomWrap');
  const spacer = document.getElementById('paperZoomSpacer');
  const paper = document.getElementById('paper');
  if(!wrap || !spacer || !paper) return;
  const naturalW = paper.offsetWidth;
  const naturalH = paper.offsetHeight;
  wrap.style.transform = `scale(${currentZoom})`;
  spacer.style.width = Math.round(naturalW * currentZoom) + 'px';
  spacer.style.height = Math.round(naturalH * currentZoom) + 'px';
}
function fitZoomToWidth(){
  const scrollEl = document.getElementById('previewScroll');
  const paper = document.getElementById('paper');
  if(!scrollEl || !paper) return;
  const available = scrollEl.getBoundingClientRect().width - 24;
  const naturalW = paper.offsetWidth;
  if(naturalW > 0 && available > 0){
    currentZoom = Math.max(0.25, Math.min(1, available / naturalW));
    applyZoom();
  }
}
function initPinchZoom(){
  const scrollEl = document.getElementById('previewScroll');
  if(!scrollEl) return;

  scrollEl.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2){
      pinchStartDist = getTouchDist(e.touches);
      pinchStartZoom = currentZoom;
    }
  }, {passive:true});

  scrollEl.addEventListener('touchmove', (e) => {
    if(e.touches.length === 2 && pinchStartDist > 0){
      e.preventDefault();
      const dist = getTouchDist(e.touches);
      let zoom = pinchStartZoom * (dist / pinchStartDist);
      zoom = Math.max(0.25, Math.min(2.5, zoom));
      currentZoom = zoom;
      applyZoom();
    }
  }, {passive:false});

  scrollEl.addEventListener('touchend', (e) => {
    if(e.touches.length < 2){ pinchStartDist = 0; }
    if(e.touches.length === 0){
      const now = Date.now();
      if(now - lastTapTime < 300){
        if(Math.abs(currentZoom - 1) < 0.05){ fitZoomToWidth(); }
        else { currentZoom = 1; applyZoom(); }
      }
      lastTapTime = now;
    }
  });
}

renderMenu();
renderPreview();
initPinchZoom();
